name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Unit tests
        run: python -m pytest -q

      - name: Literature benchmarks
        run: python scripts/run_benchmarks.py

      - name: Tier-1 pipeline smoke
        run: python scripts/run_pipeline.py --materials pyrite_in_calcite --trials 6 --grid 41 --skip-export

      - name: M1 solver-triangulated smoke (synthetic openEMS)
        run: python scripts/run_pipeline.py --materials pyrite_in_calcite --trials 8 --grid 41 --gate-min-improvement 0 --synthesize-openems-dumps --run-dir /tmp/mw_inv_m1_ci

      - name: M2 bench calibration smoke
        run: |
          python scripts/run_bench_calibration.py \
            --phantom saline_2_vs_0.5 \
            --measured-eps data/measured_eps.example.json \
            --lab-measurements data/lab_measurements.example.json \
            --grid 31 --trials 4 \
            --out /tmp/bench_calibration_ci.json
